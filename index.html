<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Save the Date!</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #e8969e;
    font-family: 'Georgia', serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1rem 4rem;
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(3rem, 10vw, 5.5rem);
    font-weight: 700;
    color: #fff;
    margin: 0 0 1rem;
    text-align: center;
    line-height: 1.1;
  }

  .names {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 700;
    text-align: center;
    margin: 0 0 0.75rem;
    color: #fff;
  }

  .names a {
    color: #fff;
    text-decoration: none;
  }
  .names a:hover { text-decoration: underline; }

  .amp { font-weight: 700; margin: 0 0.4rem; }

  .date-label {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: #fff;
    margin: 0 0 0.75rem;
    text-align: center;
  }

  .subtitle {
    font-size: 1rem;
    color: #fff;
    margin: 0 0 2.5rem;
    text-align: center;
    font-style: normal;
    opacity: 0.95;
  }

  .countdown-section {
    text-align: center;
    width: 100%;
    max-width: 600px;
  }

  .countdown-section h2 {
    font-size: clamp(1.2rem, 3.5vw, 1.6rem);
    font-weight: 700;
    color: #fff;
    margin-bottom: 1.8rem;
    font-family: 'Georgia', serif;
  }

  .countdown {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 160px;
    height: 160px;
    background: rgba(255,255,255,0.18);
    border-radius: 22px;
    box-shadow: 6px 6px 18px rgba(0,0,0,0.12), -3px -3px 10px rgba(255,255,255,0.25);
  }

  .unit .num {
    font-size: clamp(2.4rem, 6vw, 3.2rem);
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .unit .lbl {
    font-size: 0.95rem;
    color: #fff;
    margin-top: 0.6rem;
    font-family: 'Georgia', serif;
    opacity: 0.9;
  }

  .comments-section {
    max-width: 520px;
    width: 100%;
    margin-top: 2rem;
  }

  .comments-section h2 {
    font-size: 1rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 1.2rem;
    text-align: center;
    font-weight: 400;
  }

  .comment-form {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    margin-bottom: 1.5rem;
  }

  .comment-form input,
  .comment-form textarea {
    width: 100%;
    padding: 0.65rem 1rem;
    border: 0.5px solid rgba(255,255,255,0.5);
    border-radius: 10px;
    font-family: 'Georgia', serif;
    font-size: 0.9rem;
    background: rgba(255,255,255,0.2);
    color: #fff;
    outline: none;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .comment-form input::placeholder,
  .comment-form textarea::placeholder { color: rgba(255,255,255,0.7); }
  .comment-form input:focus,
  .comment-form textarea:focus { border-color: #fff; }

  .comment-form button {
    align-self: flex-end;
    padding: 0.55rem 1.5rem;
    border: 0.5px solid #fff;
    background: transparent;
    color: #fff;
    border-radius: 20px;
    font-family: 'Georgia', serif;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .comment-form button:hover { background: #fff; color: #e8969e; }

  .comments-list { display: flex; flex-direction: column; gap: 0.9rem; }

  .comment-item {
    background: rgba(255,255,255,0.2);
    border: 0.5px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    padding: 0.9rem 1.1rem;
  }
  .comment-item .c-name { font-weight: 600; font-size: 0.85rem; color: #fff; margin-bottom: 0.25rem; }
  .comment-item .c-text { font-size: 0.9rem; color: rgba(255,255,255,0.9); line-height: 1.6; }

  .loading-msg { font-style: italic; color: rgba(255,255,255,0.8); font-size: 0.9rem; text-align: center; padding: 1rem 0; }
</style>
</head>
<body>

<h1>Save the Date!</h1>

<p class="names">
  <a href="https://instagram.com/<place-holder>" target="_blank">Shwetal</a>
  <span class="amp">&amp;</span>
  <a href="https://instagram.com/<place-holder>" target="_blank">Pranjal</a>
</p>

<p class="date-label">27th April, 2026</p>

<p class="subtitle">Join us as we begin our greatest adventure yet!</p>

<div class="countdown-section">
  <h2>Countdown to the Big Day</h2>
  <div class="countdown">
    <div class="unit"><span class="num" id="days">0</span><span class="lbl">Days</span></div>
    <div class="unit"><span class="num" id="hours">0</span><span class="lbl">Hours</span></div>
    <div class="unit"><span class="num" id="minutes">0</span><span class="lbl">Minutes</span></div>
    <div class="unit"><span class="num" id="seconds">0</span><span class="lbl">Seconds</span></div>
  </div>
</div>

<!-- <div class="comments-section">
  <h2>💬 Leave a Comment</h2>
  <div class="comment-form">
    <input type="text" id="nameInput" placeholder="Your name" maxlength="60" />
    <textarea id="msgInput" rows="3" placeholder="Write your wishes here..."></textarea>
    <button onclick="postComment()">Post Comment</button>
  </div>
  <div class="comments-list" id="commentsList">
    <p class="loading-msg" id="loadingMsg">No comments yet. Be the first to wish them!</p>
  </div>
</div> -->

<script>
  const wedding = new Date('2026-04-27T00:00:00');

  function tick() {
    const now = new Date();
    const diff = wedding - now;
    if (diff <= 0) {
      document.getElementById('days').textContent = '0';
      document.getElementById('hours').textContent = '0';
      document.getElementById('minutes').textContent = '0';
      document.getElementById('seconds').textContent = '0';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('days').textContent = d;
    document.getElementById('hours').textContent = h;
    document.getElementById('minutes').textContent = m;
    document.getElementById('seconds').textContent = s;
  }

  tick();
  setInterval(tick, 1000);

  const comments = [];

  function postComment() {
    const name = document.getElementById('nameInput').value.trim();
    const msg = document.getElementById('msgInput').value.trim();
    if (!name || !msg) return;

    comments.unshift({ name, msg });
    document.getElementById('nameInput').value = '';
    document.getElementById('msgInput').value = '';
    renderComments();
  }

  function renderComments() {
    const list = document.getElementById('commentsList');
    const loading = document.getElementById('loadingMsg');
    if (comments.length === 0) {
      loading.style.display = 'block';
      list.innerHTML = '';
      list.appendChild(loading);
      return;
    }
    list.innerHTML = '';
    comments.forEach(c => {
      const el = document.createElement('div');
      el.className = 'comment-item';
      el.innerHTML = `<div class="c-name">${esc(c.name)}</div><div class="c-text">${esc(c.msg)}</div>`;
      list.appendChild(el);
    });
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
